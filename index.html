<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Quest：數據庫操練平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@300;400;500;700;900&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg: #F0F2F5; 
            --glass: rgba(255, 255, 255, 0.35);
            --glass-strong: rgba(255, 255, 255, 0.5);
            --glass-subtle: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-highlight: rgba(255, 255, 255, 1);
            --accent: #F97316; --accent-hover: #EA580C;
            --accent-glow: rgba(249,115,22,0.18); --accent-soft: rgba(249,115,22,0.08);
            --success: #10B981; --success-soft: rgba(16,185,129,0.10); --error: #EF4444;
            --error-soft: rgba(239,68,68,0.10); --text: #0F172A; --text-light: #475569;
            --text-muted: #64748B;
            --border-light: rgba(148, 163, 184, 0.2);
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.05); 
            --shadow-md: 0 12px 40px rgba(0,0,0,0.08);
            --radius-xl: 28px; --radius-lg: 22px; --radius-md: 16px; --radius-sm: 12px; --radius-xs: 8px;
            --pixel: 'Press Start 2P', monospace; --body: 'Noto Sans TC', sans-serif; --code: 'Fira Code', monospace;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        html{font-size:15px;scroll-behavior:smooth;}
        body{font-family:var(--body);color:var(--text);min-height:100vh;overflow-x:hidden;background:var(--bg);position:relative;}
        
        .bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;background:linear-gradient(135deg,#F8FAFC 0%,#EFF6FF 30%,#F0FDF4 60%,#FFF7ED 100%);}
        .blob{position:fixed;border-radius:50%;filter:blur(90px);will-change:transform;z-index:0;}
        .blob-1{width:600px;height:600px;background:radial-gradient(circle,rgba(249,115,22,0.18),transparent 70%);top:-10%;left:-5%;animation:bd1 25s ease-in-out infinite;}
        .blob-2{width:500px;height:500px;background:radial-gradient(circle,rgba(16,185,129,0.14),transparent 70%);bottom:-8%;right:-3%;animation:bd2 30s ease-in-out infinite;}
        .blob-3{width:400px;height:400px;background:radial-gradient(circle,rgba(56,189,248,0.12),transparent 70%);top:30%;right:25%;animation:bd3 22s ease-in-out infinite;}
        @keyframes bd1{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(60px,40px) scale(1.08);}66%{transform:translate(-30px,70px) scale(0.95);}}
        @keyframes bd2{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(-50px,-30px) scale(1.05);}66%{transform:translate(40px,-60px) scale(0.97);}}
        @keyframes bd3{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-40px,50px) scale(1.1);}}
        
        .glass{background:var(--glass);backdrop-filter:blur(32px) saturate(180%);-webkit-backdrop-filter:blur(32px) saturate(180%);border:1px solid var(--glass-border);border-radius:var(--radius-xl);box-shadow:var(--shadow-md),inset 0 1px 0 var(--glass-highlight),inset 0 -1px 1px rgba(255,255,255,0.2);position:relative;overflow:hidden;}
        .glass::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:1.5px;background:linear-gradient(135deg,rgba(255,255,255,0.9),rgba(255,255,255,0.1) 30%,rgba(255,255,255,0.05) 70%,rgba(255,255,255,0.4));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;z-index:1;}
        .glass::after{content:'';position:absolute;top:0;left:0;right:0;height:60%;background:linear-gradient(180deg,rgba(255,255,255,0.35),transparent);border-radius:var(--radius-xl) var(--radius-xl) 0 0;pointer-events:none;z-index:1;}
        
        header{position:sticky;top:0;z-index:100;background:var(--glass-strong);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);border-bottom:1px solid var(--glass-border);box-shadow:var(--shadow-sm);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;}
        .nav-logo{display:flex;align-items:center;gap:0.65rem;position:relative;z-index:2;}
        .nav-logo .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent-hover));border-radius:var(--radius-xs);display:flex;align-items:center;justify-content:center;font-family:var(--pixel);font-size:0.45rem;color:#fff;box-shadow:0 2px 10px var(--accent-glow);}
        .nav-logo h1{font-family:var(--pixel);font-size:0.6rem;color:var(--text);letter-spacing:0.6px;} .nav-logo h1 span{color:var(--accent);}
        
        .nav-categories{position:relative; display:flex;gap:4px;align-items:center;background:var(--glass-subtle); padding:4px; border-radius:50px; z-index:2;}
        .slider-indicator{position:absolute; top:4px; left:4px; height:calc(100% - 8px); background:linear-gradient(135deg,var(--accent),var(--accent-hover)); border-radius:50px; transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); z-index:1; box-shadow:0 2px 12px var(--accent-glow); pointer-events:none;}
        .view-tab{position:relative; z-index:2; font-family:var(--pixel);font-size:0.55rem;padding:6px 14px;background:transparent;border:none;color:var(--text-muted);cursor:pointer;transition:color 0.3s;letter-spacing:0.3px;white-space:nowrap;}
        .view-tab.active{color:#fff;}

        .nav-right{display:flex;align-items:center;gap:0.75rem;position:relative;z-index:2;}
        .nav-progress{display:flex;align-items:center;gap:0.4rem;font-family:var(--pixel);font-size:0.42rem;color:var(--text-light);}
        .nav-progress .progress-bar{width:68px;height:6px;background:rgba(148,163,184,0.15);border-radius:3px;overflow:hidden;}
        .nav-progress .progress-fill{height:100%;background:linear-gradient(90deg,var(--success),#34D399);border-radius:3px;transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);}
        .nav-avatar{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent-hover));border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.75rem;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px var(--accent-glow); border:none;} .nav-avatar:hover{transform:scale(1.1);}
        
        main{position:relative;z-index:10;display:block;padding:15px;height:calc(100vh - 74px); overflow:hidden;}
        .view-grid{width:100%;height:100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;}
        #practiceView{display:grid; grid-template-columns: 264px 1fr 284px; gap: 10px;}
        #dictView{display:none; grid-template-columns: 1fr;}
        
        .panel-header{padding:1rem 1.5rem;background:rgba(255,255,255,0.15);border-bottom:1px solid var(--border-light);backdrop-filter:blur(8px);font-family:var(--pixel);font-size:0.6rem;color:var(--text-light);display:flex;align-items:center;gap:0.5rem;letter-spacing:0.3px;flex-shrink:0;position:relative;z-index:2;} .panel-header i{color:var(--accent);font-size:0.8rem;}
        
        .question-list{flex:0 0 auto;max-height:220px;overflow-y:auto;padding:0.35rem;border-bottom:1px solid var(--border-light);position:relative;z-index:2;} .question-list::-webkit-scrollbar{width:4px;} .question-list::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.2);border-radius:2px;}
        .q-item{display:flex;align-items:center;gap:0.4rem;padding:0.4rem 0.5rem;margin-bottom:2px;border:1.5px solid transparent;border-radius:var(--radius-sm);cursor:pointer;transition:all 0.15s;font-size:0.76rem;color:var(--text-light);} .q-item:hover{background:rgba(249,115,22,0.05);border-color:rgba(249,115,22,0.12);} .q-item.active{background:rgba(249,115,22,0.08);border-color:rgba(249,115,22,0.25);box-shadow:0 2px 8px var(--accent-glow);}
        .q-item .q-num{width:20px;height:20px;background:rgba(148,163,184,0.1);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--pixel);font-size:0.32rem;color:var(--text-muted);flex-shrink:0;transition:all 0.15s;} .q-item.active .q-num{background:linear-gradient(135deg,var(--accent),var(--accent-hover));color:#fff;} .q-item.completed .q-num{background:var(--success);color:#fff;} .q-item.completed .q-num::after{content:'✓';font-size:0.5rem;} .q-item.completed .q-num span{display:none;} .q-item .q-title{font-size:0.72rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;} .q-item .q-diff{margin-left:auto;display:flex;gap:2px;flex-shrink:0;} .q-item .q-diff .dot{width:5px;height:5px;background:rgba(148,163,184,0.2);border-radius:2px;} .q-item .q-diff .dot.filled{background:var(--accent);}
        
        .question-detail{flex:1;overflow-y:auto;padding:0.8rem;position:relative;z-index:2;} .question-detail::-webkit-scrollbar{width:4px;} .question-detail::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.2);border-radius:2px;}
        .detail-title{font-weight:700;font-size:0.92rem;color:var(--text);margin-bottom:0.5rem;line-height:1.5;} .detail-desc{font-size:0.8rem;line-height:1.8;color:var(--text);margin-bottom:0.7rem;padding:0.6rem;background:rgba(255,255,255,0.45);border:1px solid var(--border-light);border-radius:var(--radius-md);} .dse-tip{display:flex;align-items:flex-start;gap:0.35rem;padding:0.5rem 0.6rem;background:var(--success-soft);border:1px solid rgba(16,185,129,0.2);border-radius:var(--radius-sm);margin-bottom:0.7rem;font-size:0.72rem;color:#065F46;line-height:1.6;} .dse-tip i{margin-top:2px;flex-shrink:0;color:var(--success);}
        .schema-section{margin-bottom:0.5rem;} .schema-section h4{font-family:var(--pixel);font-size:0.4rem;color:var(--text-light);margin-bottom:0.35rem;letter-spacing:0.3px;} 
        .schema-table-title { font-family: var(--pixel); font-size: 0.5rem; color: var(--accent); margin-bottom: 6px; letter-spacing: 0.3px; }
        .data-preview-table { width: 100%; font-size: 0.65rem; border-collapse: collapse; margin-bottom: 12px; background: rgba(255,255,255,0.4); border-radius: 8px; overflow: hidden; }
        .data-preview-table th { background: rgba(15,23,42,0.8); color: #fff; padding: 5px; text-align: left; font-family: var(--code); }
        .data-preview-table th.pk { color: var(--accent); }
        .data-preview-table td { padding: 4px 5px; border-bottom: 1px solid var(--border-light); font-family: var(--code); color: var(--text); }
        .data-preview-table tr:last-child td { border-bottom: none; }

        .editor-panel{display:flex;flex-direction:column;} 
        .editor-header{padding:0.75rem 1.2rem;background:rgba(255,255,255,0.1);border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:2;gap:15px;} 
        .editor-header-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;} 
        .editor-tab{font-family:var(--pixel);font-size:0.42rem;color:var(--text-muted);padding:3px 9px;border:1px solid transparent;border-radius:50px;background:transparent;cursor:pointer;transition:all 0.15s;} .editor-tab.active{background:rgba(255,255,255,0.55);border-color:var(--border-light);color:var(--text);}
        .editor-actions{display:flex;gap:5px;} .btn-run{font-family:var(--pixel);font-size:0.42rem;padding:6px 16px;background:linear-gradient(135deg,var(--accent),var(--accent-hover));border:none;border-radius:50px;color:#fff;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:5px;letter-spacing:0.3px;box-shadow:0 2px 12px var(--accent-glow);} .btn-run:hover{transform:translateY(-1px);box-shadow:0 4px 18px var(--accent-glow);} .btn-run:active{transform:translateY(1px);} .btn-run.running{animation:pulse 0.6s infinite;} @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}} .btn-clear{font-family:var(--pixel);font-size:0.38rem;padding:6px 10px;background:rgba(255,255,255,0.35);border:1px solid var(--border-light);border-radius:50px;color:var(--text-muted);cursor:pointer;transition:all 0.15s;} .btn-clear:hover{background:var(--error-soft);border-color:rgba(239,68,68,0.3);color:var(--error);}
        
        .slider-container { position:relative; display:flex; gap:2px; background:var(--glass-subtle); padding:2px; border-radius:50px; }
        .cat-tab{position:relative; z-index:2; font-family:var(--pixel); font-size:0.55rem; padding:4px 12px; background:transparent; border:none; color:var(--text-muted); cursor:pointer; transition:color 0.3s; letter-spacing:0.3px; white-space:nowrap; line-height:1.5; flex-shrink: 0;}
        .cat-tab.active{color:#fff;}
        
        .cat-scroll-container { position:relative; display:flex; gap:2px; overflow-x:auto; max-width:100%; padding:2px; -ms-overflow-style: none; scrollbar-width: none; }
        .cat-scroll-container::-webkit-scrollbar { height: 4px; }
        .cat-scroll-container::-webkit-scrollbar-track { background: transparent; }
        .cat-scroll-container::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.4); border-radius: 2px; }

        .editor-area{flex:1;display:flex;position:relative;overflow:hidden;background:rgba(255,255,255,0.1);box-shadow:inset 0 2px 6px rgba(0,0,0,0.05);position:relative;z-index:2;} .line-numbers{width:40px;background:rgba(148,163,184,0.05);border-right:1px solid var(--border-light);padding:0.8rem 0;text-align:center;font-family:var(--code);font-size:0.75rem;color:var(--text-muted);line-height:1.65;user-select:none;overflow:hidden;flex-shrink:0;} .line-numbers div{padding:0 2px;} #sqlEditor{flex:1;background:transparent;border:none;outline:none;resize:none;padding:0.8rem 1.2rem;font-family:var(--code);font-size:0.85rem;line-height:1.65;color:var(--text);tab-size:2;} #sqlEditor::placeholder{color:var(--text-muted);font-style:italic;} #sqlEditor:focus{background:rgba(255,255,255,0.1);} .editor-footer{padding:0.25rem 0.75rem;background:rgba(255,255,255,0.2);border-top:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;font-size:0.62rem;color:var(--text-muted);flex-shrink:0;position:relative;z-index:2;} .shortcut-hint kbd{display:inline-block;padding:0 4px;background:rgba(255,255,255,0.4);border:1px solid var(--border-light);border-radius:4px;font-family:var(--code);font-size:0.58rem;}
        
        .result-display{flex:1;overflow-y:auto;padding:1.2rem;position:relative;z-index:2;} .result-display::-webkit-scrollbar{width:4px;} .result-display::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.2);border-radius:2px;} .result-idle{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:0.7rem;color:var(--text-muted);} .result-idle .idle-icon{width:48px;height:48px;background:var(--accent-soft);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--accent);animation:idle 3s ease-in-out infinite;} @keyframes idle{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}} .result-dialog{padding:0.5rem 0.7rem;margin-bottom:0.5rem;font-size:0.76rem;line-height:1.6;border-radius:var(--radius-sm);border:1px solid;} .result-dialog.success{background:var(--success-soft);border-color:rgba(16,185,129,0.25);color:#065F46;} .result-dialog.error{background:var(--error-soft);border-color:rgba(239,68,68,0.25);color:#991B1B;} .result-table-wrap{overflow-x:auto;margin-bottom:0.5rem;} .result-table-label{font-family:var(--pixel);font-size:0.45rem;color:var(--text-muted);margin-bottom:6px;letter-spacing:0.5px;} .result-table{width:100%;font-size:0.66rem;border-collapse:separate;border-spacing:0;background:rgba(255,255,255,0.5);border:1px solid var(--border-light);border-radius:var(--radius-sm);overflow:hidden;} .result-table th{background:rgba(15,23,42,0.85);color:#fff;padding:4px 6px;font-weight:500;text-align:left;font-size:0.62rem;font-family:var(--code);white-space:nowrap;} .result-table td{padding:3px 6px;border-bottom:1px solid var(--border-light);font-family:var(--code);font-size:0.62rem;color:var(--text-light);white-space:nowrap;} .result-table tr:nth-child(even) td{background:rgba(148,163,184,0.04);} .result-table tr:last-child td{border-bottom:none;} .answer-compare{padding:0.5rem;border:1px dashed var(--border-light);border-radius:var(--radius-sm);background:rgba(255,255,255,0.35);margin-bottom:0.5rem;} .answer-compare h5{font-family:var(--pixel);font-size:0.38rem;color:var(--text-light);margin-bottom:0.35rem;letter-spacing:0.3px;} .answer-compare pre{font-family:var(--code);font-size:0.68rem;color:var(--accent-hover);line-height:1.6;} .btn-next{width:100%;font-family:var(--pixel);font-size:0.42rem;padding:8px;background:linear-gradient(135deg,var(--accent),var(--accent-hover));border:none;border-radius:50px;color:#fff;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:5px;box-shadow:0 2px 12px var(--accent-glow);} .btn-next:hover{transform:translateY(-1px);}
        
        .plant-section{flex:0 0 auto;padding:0.5rem 0.7rem 0.45rem;background:rgba(255,255,255,0.25);border-top:1px solid var(--border-light);text-align:center;position:relative;z-index:2;} .plant-section h4{font-family:var(--pixel);font-size:0.38rem;color:var(--text-muted);margin-bottom:0.35rem;letter-spacing:0.3px;} .plant-container{position:relative;width:120px;height:85px;margin:0 auto 0.25rem;} .pot-modern{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:42px;height:28px;background:linear-gradient(180deg,var(--accent),var(--accent-hover));border-radius:4px 4px 10px 10px;box-shadow:0 3px 10px var(--accent-glow);} .pot-modern::before{content:'';position:absolute;top:-5px;left:-3px;width:48px;height:7px;background:var(--accent);border-radius:4px;} .stem-modern{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);width:3px;background:linear-gradient(180deg,#34D399,#10B981);border-radius:2px;transition:height 0.8s cubic-bezier(0.34,1.56,0.64,1);} .leaf-modern{position:absolute;width:10px;height:6px;background:#34D399;border-radius:0 70% 70% 0;} .leaf-modern.left{transform:scaleX(-1);border-radius:70% 0 0 70%;} .flower-modern{position:absolute;width:8px;height:8px;background:linear-gradient(135deg,#FBBF24,#F59E0B);border-radius:50%;box-shadow:0 0 6px rgba(251,191,36,0.4);} .plant-label{font-family:var(--pixel);font-size:0.36rem;color:var(--text-muted);}
        
        .pixel-star{position:fixed;pointer-events:none;z-index:999;font-family:var(--pixel);color:var(--accent);font-size:0.85rem;animation:star-fly 1s ease-out forwards;} @keyframes star-fly{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.3);}} .toast-container{position:fixed;top:70px;right:14px;z-index:200;display:flex;flex-direction:column;gap:6px;} .toast{padding:0.45rem 0.75rem;border:1px solid var(--glass-border);border-radius:var(--radius-md);font-size:0.72rem;animation:toast-in 0.3s ease-out;display:flex;align-items:center;gap:0.35rem;background:var(--glass-strong);backdrop-filter:blur(16px);box-shadow:var(--shadow-md);} .toast.success{background:rgba(236,253,245,0.92);border-color:rgba(16,185,129,0.3);color:#065F46;} .toast.error{background:rgba(254,242,242,0.92);border-color:rgba(239,68,68,0.3);color:#991B1B;} .toast.info{color:var(--text);} @keyframes toast-in{from{opacity:0;transform:translateX(24px);}to{opacity:1;transform:translateX(0);}}
        
        .modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(15,23,42,0.2);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px); opacity:0; visibility:hidden; transition: opacity 0.3s ease, visibility 0.3s ease;} 
        .modal-overlay.active{opacity:1; visibility:visible;}
        .modal-box{background:var(--glass-strong);backdrop-filter:blur(28px) saturate(200%);border:1px solid var(--glass-border);border-radius:var(--radius-xl);box-shadow:var(--shadow-md);padding:1.8rem;max-width:360px;width:90%;text-align:center;position:relative;overflow:hidden; transform: scale(0.9) translateX(-30px); opacity:0; transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;} 
        .modal-overlay.active .modal-box{transform: scale(1) translateX(0); opacity:1;}

    <script>
    const API_BASE_URL = 'https://script.google.com/macros/s/AKfycbxR3eHA3KBgU19KCXx0zysRJGctB2A-zJVpyDbU8UvZd_F1tXO2PnXkn9wmkwur52wKrg/exec';
    const GOOGLE_CLIENT_ID = '947607172653-ror27p5j0l16shgm5ta712iq676deaop.apps.googleusercontent.com'; 

    // 點擊氣泡效果
    document.addEventListener('click', function(e) {

        if (target) {

            ripple.style.width = size + 'px';
            ripple.style.height = size + 'px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);

    // 滑行指示器邏輯
    function updateSlider(container) {
        const active = container.querySelector('.active');
        const indicator = container.querySelector('.slider-indicator');
        if (active && indicator) {
            indicator.style.transform = `translateX(${active.offsetLeft - 2}px)`;
            indicator.style.width = `${active.offsetWidth}px`;
        }
    }

    class SqlSandbox {
        constructor() { this.db = null; this.SQL = null; this.currentSchema = []; }
        async init() {
            try {
                this.SQL = await initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}` });
                document.getElementById('sqlEditor').disabled = false;
                document.getElementById('sqlEditor').placeholder = '-- 在此輸入 SQL 語句...';
                return true;
            } catch (err) { console.error('SQLite 引擎載入失敗:', err); return false; }
        }
        parseTableData(tableDataStr) {
            const tables = []; const sqlStatements = [];
            const normalizedStr = String(tableDataStr).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const lines = normalizedStr.split('\n').map(l => l.trim());
            let currentTable = null; let currentColumns = []; let currentData = [];
            const saveCurrentTable = () => {
                if (currentTable && currentColumns.length > 0) {
                    tables.push({ name: currentTable, columns: currentColumns, rows: currentData });
                    const colDef = currentColumns.map(c => `${c.name} ${c.type}${c.pk ? ' PRIMARY KEY' : ''}`).join(', ');
                    sqlStatements.push(`CREATE TABLE ${currentTable} (${colDef});`);
                    if (currentData.length > 0) {
                        const colNames = currentColumns.map(c => c.name).join(', ');
                        currentData.forEach(row => {
                            const values = row.map(v => { if (v === null || v === '') return "''"; return isNaN(v) ? `'${v.replace(/'/g, "''")}'` : v; }).join(', ');
                            sqlStatements.push(`INSERT INTO ${currentTable} (${colNames}) VALUES (${values});`);
                        });
                    }
                }
            };
            for (const line of lines) {
                if (line.length === 0) continue;
                if (line.startsWith('[') && line.endsWith(']')) { saveCurrentTable(); currentTable = line.substring(1, line.length - 1).trim(); currentColumns = []; currentData = []; } 
                else if (currentTable) {
                    const colMatch = line.match(/^([a-zA-Z_]\w*)\s*\((.*?)\)$/i);
                    if (colMatch) { const colName = colMatch[1].trim(); const props = colMatch[2].toUpperCase(); const type = props.match(/TEXT|INTEGER|INT|REAL/)?.[0] || 'TEXT'; const isPk = props.includes('PK'); currentColumns.push({ name: colName, type, pk: isPk }); } 
                    else { currentData.push(line.split(',').map(v => v.trim())); }
                }
            }
            saveCurrentTable(); this.currentSchema = tables; return sqlStatements.join('\n');
        }
        loadEnvironment(tableDataStr) { 
            this.db = new this.SQL.Database(); 
            try { 
                if (!tableDataStr) throw new Error('table_data 為空');
                const sqlStr = this.parseTableData(tableDataStr); 
                if (!sqlStr) throw new Error('無法解析出有效的 SQL 語句');
                const stmts = sqlStr.split(';').map(s => s.trim()).filter(s => s.length > 0);
                for (const stmt of stmts) this.db.run(stmt);
                return true; 
            } catch (err) { console.error('❌ 環境建置失敗:', err.message); return false; } 
        }
        executeSql(sql) {
            if (!this.db) return { success: false, error: '資料庫未初始化。請點擊左側題目載入環境。' };
            try {
                const dangerousRegex = /\b(DROP|ALTER|TRUNCATE|CREATE|INSERT|UPDATE|DELETE|GRANT)\b/i;
                if (dangerousRegex.test(sql)) return { success: false, error: '安全限制：僅允許 SELECT 查詢。' };
                let result = this.db.exec(sql);
                let formatted = result.map(r => ({ columns: r.columns, rows: r.values }));
                return { success: true, data: formatted };
            } catch (err) { return { success: false, error: err.message }; }
        }
        normalizeResult(data, autoOrder) {
            if (!data || data.length === 0) return null;
            let res = data[0];
            if (!res || !res.columns || !res.rows) return null;
            let processedRows = res.rows.map(row => row.map(cell => cell === null ? 'NULL' : String(cell)));
            processedRows = processedRows.map(r => r.join('|||'));
            if (autoOrder) processedRows.sort();
            return { columns: res.columns, sortedRows: processedRows };
        }
        checkAnswer(studentSql, answerSql, autoOrder) {
            const studentRes = this.executeSql(studentSql);
            const answerRes = this.executeSql(answerSql);
            if (!studentRes.success) return { isCorrect: false, message: studentRes.error, studentData: null };
            if (!answerRes.success) return { isCorrect: false, message: '標準答案語法錯誤: ' + answerRes.error, studentData: null };
            const normStudent = this.normalizeResult(studentRes.data, autoOrder);
            const normAnswer = this.normalizeResult(answerRes.data, autoOrder);
            const isCorrect = JSON.stringify(normStudent) === JSON.stringify(normAnswer);
            return { isCorrect, studentData: studentRes.data[0] };
        }
    }

    const sandbox = new SqlSandbox();
    let currentCat = 'all', currentQId = null, completedIds = new Set();
    let isLoggedIn = false, studentName = '';
    let DB_QUESTIONS = [], DB_ENVIRONMENTS = [], DB_DICTIONARY = [], DB_CATEGORIES = [];

    const $ = id => document.getElementById(id);
    const questionList=$('questionList'), questionDetail=$('questionDetail'),
          sqlEditor=$('sqlEditor'), lineNumbers=$('lineNumbers'),
          resultDisplay=$('resultDisplay'), runBtn=$('runBtn'),
          clearBtn=$('clearBtn'), hintBtn=$('hintBtn'),
          progressFill=$('progressFill'), progressText=$('progressText'),
          charCount=$('charCount'), stemModern=$('stemModern'),
          plantContainer=$('plantContainer'), plantLabel=$('plantLabel'),
          loginModal=$('loginModal'), avatarBtn=$('avatarBtn'),
          toastContainer=$('toastContainer'), connErrorModal=$('connErrorModal'),
          practiceView=$('practiceView'), dictView=$('dictView');

    function updateStatus(target, state) {
        const dotMap = { cloud: 'dotCloud', engine: 'dotEngine', db: 'dotDB' };
        const dot = document.getElementById(dotMap[target]);
        if (dot) dot.className = 'status-dot ' + state;
    }

    async function loadData() {
        updateStatus('cloud', 'off');
        try {
            const qRes = await fetch(`${API_BASE_URL}?action=getQuestions`); if (!qRes.ok) throw new Error(`HTTP ${qRes.status}`); DB_QUESTIONS = await qRes.json();
            const eRes = await fetch(`${API_BASE_URL}?action=getEnvironments`); if (!eRes.ok) throw new Error(`HTTP ${eRes.status}`); DB_ENVIRONMENTS = await eRes.json();
            const cRes = await fetch(`${API_BASE_URL}?action=getCategories`); if (!cRes.ok) throw new Error(`HTTP ${cRes.status}`); DB_CATEGORIES = await cRes.json();
            updateStatus('cloud', 'on'); updateStatus('db', 'off');
            renderCategories(); renderQuestionList(); updateProgress(); checkNewAnnouncements();
        } catch (err) {
            console.error("雲端同步錯誤:", err);
            updateStatus('cloud', 'err'); 
            const errorP = document.querySelector('#connErrorModal p');
            if(errorP) errorP.innerHTML = `無法連接至后臺伺服器。<br><span style="font-size:0.7rem;color:var(--error);">原因：${err.message}</span>`;
            openModal(connErrorModal); 
        }
    }

    async function submitResult(qId, isCorrect, sql) {
        if (!isLoggedIn) return;
        try { await fetch(API_BASE_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'submitResult', username: studentName, question_id: qId, is_correct: isCorrect, submitted_sql: sql }) }); } catch (err) { console.error('上傳失敗'); }
    }

    async function loadUserProgress(username) {
        try {
            const res = await fetch(`${API_BASE_URL}?action=getUserProgress&username=${username}`); if (!res.ok) throw new Error('讀取進度失敗');
            const correctIds = await res.json();
            correctIds.forEach(id => completedIds.add(parseInt(id)));
            renderQuestionList(); updateProgress(); updatePlant();
            showToast('success', `歡迎，${username}！已恢復 ${completedIds.size} 題進度`);
        } catch (err) { console.error('讀取進度錯誤:', err); showToast('error', '讀取進度失敗'); }
    }

    window.onload = function() {
        if (window.google) {
            google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleCredentialResponse });
            google.accounts.id.renderButton(document.getElementById('googleLoginBtn'), { theme: "outline", size: "large", text: "signin_with", shape: "pill", width: 280, locale: "zh-HK" });
        }
    };

    function handleCredentialResponse(response) {
        const errorMsgEl = document.getElementById('loginErrorMsg');
        errorMsgEl.style.display = 'none';
        showToast('info', '正在驗證學校身份...');
        fetch(API_BASE_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'verifyToken', id_token: response.credential }) })
        .then(res => res.json())
        .then(data => {
            if (data.success && data.email) {
                studentName = data.email; isLoggedIn = true; closeModal(loginModal);
                showToast('info', '正在讀取作答紀錄...');
                loadUserProgress(studentName);
            } else {
                errorMsgEl.textContent = data.error || '登入失敗，請重試。';
                errorMsgEl.style.display = 'block';
                showToast('error', data.error || '登入失敗');
            }
        })
        .catch(err => { console.error('Token驗證請求失敗:', err); errorMsgEl.textContent = '網路錯誤，請重試。'; errorMsgEl.style.display = 'block'; });
    }
    
    avatarBtn.addEventListener('click',()=>{if(!isLoggedIn){openModal(loginModal);}else showToast('info','身份：'+studentName);});

    // 視圖切換邏輯 (流暢滑動)
    document.querySelectorAll('.nav-categories .view-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.nav-categories .view-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            updateSlider(document.getElementById('navCats'));
            
            const view = tab.dataset.view;
            if (view === 'practiceView') {
                dictView.style.transform = 'translateX(100%)'; dictView.style.opacity = '0';
                setTimeout(() => { dictView.style.display = 'none'; practiceView.style.display = 'grid'; practiceView.style.transform = 'translateX(-100%)'; practiceView.style.opacity = '0'; requestAnimationFrame(() => { practiceView.style.transform = 'translateX(0)'; practiceView.style.opacity = '1'; }); }, 300);
            } else { 
                practiceView.style.transform = 'translateX(-100%)'; practiceView.style.opacity = '0';
                setTimeout(() => { practiceView.style.display = 'none'; dictView.style.display = 'grid'; dictView.style.transform = 'translateX(100%)'; dictView.style.opacity = '0'; requestAnimationFrame(() => { dictView.style.transform = 'translateX(0)'; dictView.style.opacity = '1'; }); initDictionary(); }, 300);
            }
        });
    });

    function renderCategories() {
        const container = document.getElementById('catContainer');
        let html = `<div class="slider-indicator" id="catSlider"></div><button class="cat-tab active" data-cat="all">ALL</button>`;
        DB_CATEGORIES.forEach(cat => { html += `<button class="cat-tab" data-cat="${cat.name}">${cat.name}</button>`; });
        container.innerHTML = html;
        container.querySelectorAll('.cat-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                container.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                updateSlider(container);
                currentCat = tab.dataset.cat; renderQuestionList();
            });
        });
        setTimeout(() => updateSlider(container), 100);
    }

    function renderQuestionList() {
        const filtered = currentCat==='all' ? DB_QUESTIONS : DB_QUESTIONS.filter(q=>q.category===currentCat);
        questionList.innerHTML = filtered.map(q => { const isActive = q.id===currentQId, isDone = completedIds.has(q.id); return `<div class="q-item ${isActive?'active':''} ${isDone?'completed':''}" data-id="${q.id}" tabindex="0"><div class="q-num"><span>${q.id}</span></div><div class="q-title">${q.title}</div><div class="q-diff">${[1,2,3].map(d=>`<div class="dot ${d<=q.difficulty?'filled':''}"></div>`).join('')}</div></div>`; }).join('');
        questionList.querySelectorAll('.q-item').forEach(item=>{item.addEventListener('click',()=>{currentQId=parseInt(item.dataset.id);renderQuestionList();renderQuestionDetail();resetResult();loadSandboxEnv();});});
    }
    
    function loadSandboxEnv() {
        const q = DB_QUESTIONS.find(q=>q.id===currentQId); 
        if(!q) { updateStatus('db', 'off'); return; }
        const targetEnvId = parseInt(q.env_id);
        const env = DB_ENVIRONMENTS.find(e => parseInt(e.id) === targetEnvId);
        if (!env) { showToast('error', '找不到對應的資料庫環境 (env_id: ' + q.env_id + ')'); updateStatus('db', 'err'); return; }
        if (!sandbox.SQL) { updateStatus('db', 'err'); return; }
        const tableData = env.table_data || env.create_sql;
        if (!tableData) { showToast('error', 'Google Sheet 中找不到資料表數據'); updateStatus('db', 'err'); return; }
        const success = sandbox.loadEnvironment(tableData);
        updateStatus('db', success ? 'on' : 'err'); 
        if (!success) showToast('error', '資料庫建置失敗，請檢查 table_data 格式');
        renderQuestionDetail(); 
    }
    
    function renderQuestionDetail() {
        const q = DB_QUESTIONS.find(q=>q.id===currentQId);
        if(!q) { questionDetail.innerHTML = '<div class="result-idle"><p>選擇題目開始</p></div>'; return; }
        let schemaHtml = '';
        const tables = sandbox.currentSchema; 
        if (tables && tables.length > 0) {
            schemaHtml = `<div class="schema-section"><h4><i class="fas fa-table" style="margin-right:3px"></i> TABLE PREVIEW</h4>`;
            tables.forEach(table => {
                schemaHtml += `<div class="schema-table-title">TABLE: ${table.name}</div>
                <table class="data-preview-table">
                    <thead><tr>${table.columns.map(c=>`<th class="${c.pk?'pk':''}">${c.name}</th>`).join('')}</tr></thead>
                    <tbody>
                    ${table.rows.map(r => `<tr>${r.map(v => `<td>${v}</td>`).join('')}</tr>`).join('')}
                    </tbody>
                </table>`;
            });
            schemaHtml += `</div>`;
        }
        questionDetail.innerHTML = `<div class="detail-title"><span style="font-family:var(--pixel);font-size:0.4rem;color:var(--accent);">[${q.category.toUpperCase()}]</span><br>${q.title}</div><div class="detail-desc">${q.description}</div><div class="dse-tip"><i class="fas fa-lightbulb"></i><span>${q.dse_tip}</span></div>${schemaHtml}`;
    }

    function updateLineNumbers(){const lines=sqlEditor.value.split('\n').length;const nums=[];for(let i=1;i<=Math.max(lines,8);i++)nums.push(`<div>${i}</div>`);lineNumbers.innerHTML=nums.join('');}
    sqlEditor.addEventListener('input',()=>{updateLineNumbers();charCount.textContent=sqlEditor.value.length+' 字元';});
    sqlEditor.addEventListener('scroll',()=>{lineNumbers.scrollTop=sqlEditor.scrollTop;});
    sqlEditor.addEventListener('keydown',e=>{ if(e.key==='Tab'){e.preventDefault();const s=sqlEditor.selectionStart;sqlEditor.value=sqlEditor.value.substring(0,s)+'  '+sqlEditor.value.substring(sqlEditor.selectionEnd);sqlEditor.selectionStart=sqlEditor.selectionEnd=s+2;sqlEditor.dispatchEvent(new Event('input'));} if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();executeSQL();} });
    clearBtn.addEventListener('click',()=>{sqlEditor.value='';sqlEditor.dispatchEvent(new Event('input'));sqlEditor.focus();});
    runBtn.addEventListener('click',executeSQL);
    hintBtn.addEventListener('click',()=>{const q=DB_QUESTIONS.find(q=>q.id===currentQId);if(!q)return;showToast('info','提示：答案開頭為 "'+q.answer_sql.substring(0,18)+'..."');});

    let currentMode = 'simple'; 
    const simpleModeBtn = $('simpleModeBtn');
    const dseModeBtn = $('dseModeBtn');
    const modeSliderContainer = $('modeSliderContainer');

    simpleModeBtn.addEventListener('click', () => {
        currentMode = 'simple';
        simpleModeBtn.classList.add('active'); dseModeBtn.classList.remove('active');
        updateSlider(modeSliderContainer);
    });
    dseModeBtn.addEventListener('click', () => {
        currentMode = 'dse';
        dseModeBtn.classList.add('active'); simpleModeBtn.classList.remove('active');
        updateSlider(modeSliderContainer);
        showToast('info', '已切換至 DSE 擬真評分模式');
    });

    function executeSQL() {
        if(!currentQId) { showToast('error','請先選擇題目'); return; } 
        const sql = sqlEditor.value.trim(); if(!sql) { showToast('error','請輸入 SQL 語句'); return; } 
        const q = DB_QUESTIONS.find(q=>q.id===currentQId); if(!q) return; 
        runBtn.classList.add('running'); runBtn.innerHTML='<span class="loading-dots"><span></span><span></span><span></span></span>';
        setTimeout(() => { 
            runBtn.classList.remove('running'); runBtn.innerHTML='<i class="fas fa-play"></i> RUN'; 
            if (currentMode === 'dse') {
                const dseResult = checkDseAnswer(sql, q);
                showDseResult(dseResult, q, sql);
                submitResult(q.id, dseResult.gotMarks === dseResult.totalMarks, sql);
            } else {
                const autoOrder = (q.auto_order && q.auto_order.toUpperCase() === 'N') ? false : true;
                const result = sandbox.checkAnswer(sql, q.answer_sql, autoOrder);
                if (result.isCorrect) { 
                    const wasNew = !completedIds.has(q.id); completedIds.add(q.id); 
                    showResult('success', '執行成功！查詢傳回 '+result.studentData.rows.length+' 行數據。', result.studentData, q.answer_sql); 
                    updateProgress(); renderQuestionList(); updatePlant(); submitResult(q.id, true, sql); 
                    if(wasNew) { spawnPixelStars(runBtn); showToast('success','答對了！'); } 
                } else { 
                    let errMsg = result.message || '結果與預期不符，請檢查查詢條件。'; 
                    let studentData = result.studentData; 
                    if(!result.success && result.error) { errMsg = result.error; studentData = null; } 
                    showResult('error', errMsg, studentData, q.answer_sql); 
                    submitResult(q.id, false, sql); showToast('error','結果不正確'); 
                }
            }
        }, 400);
    }

    function checkDseAnswer(studentSql, q) {
        let totalMarks = 0; let gotMarks = 0; const criteriaResults = [];
        if (!q.marking_scheme || q.marking_scheme.trim() === '') return { error: "此題未設定 DSE 評分標準" };
        try {
            const lines = String(q.marking_scheme).replace(/\r\n/g, '\n').split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const normalizedSql = studentSql.replace(/\s+/g, ' ').trim().toUpperCase();
            lines.forEach(line => {
                const parts = line.split('|').map(p => p.trim());
                if (parts.length < 3) return; 
                const marks = parseInt(parts[0]); const desc = parts[1]; const regexStr = parts.slice(2).join('|'); 
                totalMarks += marks;
                try {
                    const regex = new RegExp(regexStr, 'i'); const isCorrect = regex.test(normalizedSql);
                    if (isCorrect) gotMarks += marks;
                    criteriaResults.push({ desc, marks, got: isCorrect ? marks : 0, isCorrect });
                } catch (e) { console.error("正則表達式錯誤:", regexStr, e); }
            });
        } catch (e) { return { error: "評分標準格式錯誤，請檢查 Google Sheet" }; }
        return { totalMarks, gotMarks, criteriaResults };
    }

    function showDseResult(dseResult, q, sql) {
        let html = '';
        if (dseResult.error) { html = `<div class="result-dialog error"><span class="dialog-icon">!</span>${dseResult.error}</div>`; resultDisplay.innerHTML = html; return; }
        html += `<div class="dse-score-header"><div class="dse-score-title"><i class="fas fa-clipboard-check"></i> DSE MARKING SCHEME</div><div class="dse-score-total">得分：${dseResult.gotMarks} / ${dseResult.totalMarks}</div></div>`;
        dseResult.criteriaResults.forEach(c => {
            html += `<div class="dse-criteria-item ${c.isCorrect ? 'correct' : 'wrong'}"><div class="dse-icon ${c.isCorrect ? 'correct' : 'wrong'}"><i class="fas ${c.isCorrect ? 'fa-check-circle' : 'fa-times-circle'}"></i></div><div class="dse-desc">${c.desc}</div><div class="dse-marks ${c.got > 0 ? 'got' : ''}">${c.got}/${c.marks} 分</div></div>`;
        });
        html += `<div class="answer-compare" style="margin-top:1rem;"><h5>標準答案參考</h5><pre>${q.answer_sql}</pre></div>`;
        if (dseResult.gotMarks === dseResult.totalMarks) {
            const wasNew = !completedIds.has(q.id); completedIds.add(q.id);
            updateProgress(); renderQuestionList(); updatePlant();
            if(wasNew) { spawnPixelStars(runBtn); }
            html += `<button class="btn-next" id="nextBtn">NEXT QUEST <i class="fas fa-arrow-right"></i></button>`;
        } else {
             html += `<div class="result-dialog error" style="margin-top:1rem;"><span class="dialog-icon">!</span>部分得分，請根據上方評分參考修改你的 SQL 語法。</div>`;
        }
        resultDisplay.innerHTML = html;
        const nextBtn = document.getElementById('nextBtn'); 
        if(nextBtn) nextBtn.addEventListener('click', () => {
            const n = DB_QUESTIONS.find(q => q.id > currentQId); if(n) { currentQId = n.id; renderQuestionList(); renderQuestionDetail(); resetResult(); loadSandboxEnv(); sqlEditor.value = ''; sqlEditor.dispatchEvent(new Event('input')); }
        });
    }

    function showResult(type, message, data, answer) {
        let html = `<div class="result-dialog ${type}"><span class="dialog-icon">${type==='success'?'✓':'✗'}</span>${message}</div>`;
        if(data && data.columns && data.rows) { html += `<div class="result-table-wrap"><div class="result-table-label">COLUMNS: ${data.columns.join(', ')}</div><table class="result-table"><thead><tr>${data.columns.map(c=>'<th>'+c+'</th>').join('')}</tr></thead><tbody>${data.rows.map(r=>'<tr>'+r.map(v=>'<td>'+(v===null?'NULL':v)+'</td>').join('')+'</tr>').join('')}</tbody></table></div>`; }
        if(answer) html += `<div class="answer-compare"><h5>${type==='success'?'你的答案':'參考答案'}</h5><pre>${answer}</pre></div>`;
        if(type==='success'){ const nextQ=DB_QUESTIONS.find(q=>q.id>currentQId&&!completedIds.has(q.id)); if(nextQ)html+=`<button class="btn-next" id="nextBtn">NEXT QUEST <i class="fas fa-arrow-right"></i></button>`; else if(completedIds.size===DB_QUESTIONS.length)html+=`<button class="btn-next" style="background:linear-gradient(135deg,var(--success),#34D399);">ALL CLEAR</button>`; }
        resultDisplay.innerHTML=html; const nextBtn=document.getElementById('nextBtn'); if(nextBtn)nextBtn.addEventListener('click',()=>{const n=DB_QUESTIONS.find(q=>q.id>currentQId);if(n){currentQId=n.id;renderQuestionList();renderQuestionDetail();resetResult();loadSandboxEnv();sqlEditor.value='';sqlEditor.dispatchEvent(new Event('input'));}});
    }
    
    function resetResult(){resultDisplay.innerHTML=`<div class="result-idle"><div class="idle-icon"><i class="fas fa-database"></i></div><p>輸入 SQL 語句並按下<br><strong>RUN</strong> 來執行查詢</p></div>`;}
    function updateProgress(){const t=DB_QUESTIONS.length,d=completedIds.size;progressText.textContent=d+'/'+t;progressFill.style.width=(d/t)*100+'%';}
    function updatePlant(){ const total=DB_QUESTIONS.length,done=completedIds.size; const stemH=Math.round((done/total)*30);stemModern.style.height=stemH+'px'; plantContainer.querySelectorAll('.leaf-modern,.flower-modern').forEach(el=>el.remove()); const leafCount=Math.min(Math.floor(done*1.5),6); for(let i=0;i<leafCount;i++){const leaf=document.createElement('div');leaf.className='leaf-modern '+(i%2===0?'left':'right'); leaf.style.position='absolute';leaf.style.bottom=(stemH-(i+1)*5+32)+'px'; leaf.style.left=`calc(50% + ${(i%2===0?-1:1)*6}px)`;stemModern.appendChild(leaf); } if(done>=total){const f=document.createElement('div');f.className='flower-modern';f.style.position='absolute';f.style.top='-6px';f.style.left='-3px';stemModern.appendChild(f);} plantLabel.textContent='已完成 '+done+' 題'; }
    function spawnPixelStars(anchor){ const rect=anchor.getBoundingClientRect(),cx=rect.left+rect.width/2,cy=rect.top+rect.height/2; for(let i=0;i<8;i++){const star=document.createElement('div');star.className='pixel-star';star.textContent=['★','✦'][Math.floor(Math.random()*2)]; const angle=(Math.PI*2/8)*i,dist=30+Math.random()*50; star.style.left=cx+'px';star.style.top=cy+'px';star.style.setProperty('--tx',Math.cos(angle)*dist+'px');star.style.setProperty('--ty',Math.sin(angle)*dist+'px'); star.style.color=['var(--accent)','#10B981','#FBBF24'][Math.floor(Math.random()*3)];star.style.fontSize=(6+Math.random()*8)+'px'; document.body.appendChild(star);setTimeout(()=>star.remove(),1100); } }
    function showToast(type,msg){ const toast=document.createElement('div');toast.className='toast '+type; toast.innerHTML=`<i class="fas ${type==='success'?'fa-check-circle':'fa-times-circle'}"></i> ${msg}`;toastContainer.appendChild(toast); setTimeout(()=>{toast.style.opacity='0';toast.style.transform='translateX(24px)';toast.style.transition='all 0.3s';setTimeout(()=>toast.remove(),350);},3000); }

    const dictContainer = $('dictContainer');

    async function initDictionary() {
        if (DB_DICTIONARY.length > 0) { renderDictionary(); return; }
        dictContainer.innerHTML = `<div style="text-align:center;color:var(--text-muted);padding:2rem 0;grid-column:1 / -1;"><i class="fas fa-spinner fa-spin"></i> 載入字典中...</div>`;
        try {
            const res = await fetch(`${API_BASE_URL}?action=getDictionary`); if (!res.ok) throw new Error('載入失敗');
            DB_DICTIONARY = await res.json();
            const categories = [...new Set(DB_DICTIONARY.map(item => item.category))];
            dictFilter.innerHTML = '<option value="all">全部分類</option>' + categories.map(c => `<option value="${c}">${c}</option>`).join('');
            renderDictionary();
        } catch (err) { dictContainer.innerHTML = `<div style="text-align:center;color:var(--error);padding:2rem 0;grid-column:1 / -1;">字典載入失敗</div>`; }
    }
    function renderDictionary() {
        const searchTerm = dictSearch.value.toLowerCase(); const cat = dictFilter.value;
        const filtered = DB_DICTIONARY.filter(item => {
            const matchCat = (cat === 'all' || item.category === cat);
            const matchSearch = (item.keyword.toLowerCase().includes(searchTerm) || item.description.toLowerCase().includes(searchTerm));
            return matchCat && matchSearch;
        });
        if (filtered.length === 0) { dictContainer.innerHTML = `<div style="text-align:center;color:var(--text-muted);padding:2rem 0;grid-column:1 / -1;">找不到符合的 SQL 語法</div>`; return; }
        dictContainer.innerHTML = filtered.map(item => `
            <div class="dict-card">
                <div class="dict-card-head"><div class="dict-keyword">${item.keyword}</div><div class="dict-category">${item.category}</div></div>
                <div class="dict-desc">${item.description}</div>

    window.openAnimModal = function(keyword) {

        const stepsMap = { 'SELECT': getSelectSteps(), 'WHERE': getWhereSteps(), 'ORDER BY': getOrderBySteps(), 'GROUP BY': getGroupBySteps(), 'LIKE': getLikeSteps() };
        currentAnimSteps = stepsMap[keyword] || [];

    };

    function buildTable(headers, rows, idPrefix, highlightCol = -1) {
        let html = `<table class="anim-table" id="${idPrefix}"><thead><tr>`;

        html += `</tr></thead><tbody>`;
        rows.forEach((r, i) => {
            html += `<tr class="anim-row" id="${idPrefix}_r${i}" style="animation-delay: ${0.1 * i + 0.2}s;">`;
            r.forEach((c, j) => html += `<td class="${j === highlightCol ? 'row-highlight' : ''}">${c}</td>`);
            html += `</tr>`;
        });

    function getWhereSteps() { const headers = ['Name', 'Age']; const rows = [['John', '20'], ['Mary', '17'], ['Bob', '25']]; return [ (stage) => { stage.innerHTML = `<div class="anim-step-box"><div class="anim-sql-code anim-text-reveal">SELECT * FROM Student <span class="anim-highlight-word">WHERE Age >= 18</span></div><div class="anim-desc anim-text-reveal" style="animation-delay: 0.3s;">解析：篩選出 Age (年齡) 大於或等於 18 的記錄。</div></div>`; }, (stage) => { stage.innerHTML = `<div class="anim-step-box"><div class="anim-sql-code">SELECT * FROM Student <span class="anim-highlight-word">WHERE Age >= 18</span></div></div><div class="anim-compare-container anim-table-container" style="animation-delay: 0.2s;"><div class="anim-compare-col"><div class="anim-compare-title">處理過程</div>${buildTable(headers, rows, 'w_t', 1)}</div></div>`; }, (stage) => { stage.innerHTML = `<div class="anim-step-box"><div class="anim-sql-code">SELECT * FROM Student <span class="anim-highlight-word">WHERE Age >= 18</span></div></div><div class="anim-compare-container anim-table-container" style="animation-delay: 0.2s;"><div class="anim-compare-col"><div class="anim-compare-title">處理過程</div>${buildTable(headers, rows, 'w_t2', 1)}</div></div>`; setTimeout(() => { const r1 = document.getElementById('w_t2_r1'); if(r1) r1.classList.add('row-fade-out'); }, 500); }, (stage) => { let beforeHTML = `<div class="anim-compare-col anim-table-container" style="animation-delay: 0.2s;"><div class="anim-compare-title">處理前 (原表)</div>${buildTable(headers, rows, 'w_b')}</div>`; let afterHTML = `<div class="anim-compare-col anim-table-container" style="animation-delay: 0.5s;"><div class="anim-compare-title">處理後 (結果)</div><table class="anim-table"><thead><tr><th>Name</th><th>Age</th></tr></thead><tbody><tr class="anim-row row-highlight" style="animation-delay: 0.6s;"><td>John</td><td>20</td></tr><tr class="anim-row row-highlight" style="animation-delay: 0.7s;"><td>Bob</td><td>25</td></tr></tbody></table></div>`; stage.innerHTML = `<div class="anim-step-box"><div class="anim-sql-code">SELECT * FROM Student <span class="anim-highlight-word">WHERE Age >= 18</span></div><div class="anim-desc">不符合條件的行被移除了。</div></div><div class="anim-compare-container">${beforeHTML}${afterHTML}</div>`; } ]; }

body></table></div>`; stage.innerHTML = `<div class="anim-step-box"><div class="anim-sql-code">SELECT * FROM Exam <span class="anim-highlight-word">ORDER BY Score DESC</span></div><div class="anim-desc">資料已按分數從高到低排列。</div></div><div class="anim-compare-container">${beforeHTML}${afterHTML}</div>`; } ]; }
    function getGroupBySteps() { const headers = ['Dept', 'Name']; const rows = [['IT', 'John'], ['HR', 'Mary'], ['IT', 'Bob']]; return [ (stage) => { stage.innerHTML = `<div class="anim-step-box"><div class="anim-sql-code anim-text-reveal">SELECT Dept, COUNT(*) <span class="anim-highlight-word">GROUP BY Dept</span></div><div class="anim-desc anim-text-reveal" style="animation-delay: 0.3s;">解析：將相同 Dept (部門) 的記錄分組，並計算每組的數量。</div></div>`; }, (stage) => { stage.innerHTML = `<div class="anim-step-box"><div class="anim-sql-code">SELECT Dept, COUNT(*) <span class="anim-highlight-word">GROUP BY Dept</span></div></div><div class="anim-compare-container anim-table-container" style="animation-delay: 0.2s;"><div class="anim-compare-col"><div class="anim-compare-title">處理過程 (分組中...)</div>${buildTable([['IT', 'John'], ['IT', 'Bob'], ['HR', 'Mary']], 'gb_t', 0)}</div></div>`; }, (stage) => { let beforeHTML = `<div class="anim-compare-col anim-table-container" style="animation-delay: 0.2s;"><div class="anim-compare-title">處理前 (原表)</div>${buildTable(headers, rows, 'gb_b')}</div>`; let afterHTML = `<div class="anim-compare-col anim-table-container" style="animation-delay: 0.5s;"><div class="anim-compare-title">處理後 (結果)</div><table class="anim-table"><thead><tr><th>Dept</th><th>COUNT(*)</th></tr></thead><tbody><tr class="anim-row row-highlight" style="animation-delay: 0.6s;"><td>IT</td><td>2</td></tr><tr class="anim-row row-highlight" style="animation-delay: 0.7s;"><td>HR</td><td>1</td></tr></tbody></table></div>`; stage.innerHTML = `<div class="anim-step-box"><div class="anim-sql-code">SELECT Dept, COUNT(*) <span class="anim-highlight-word">GROUP BY Dept</span></div><div class="anim-desc">每個部門被合併為一行，並顯示總數。</div></div><div class="anim-compare-container">${beforeHTML}${afterHTML}</div>`; } ]; }
    function getLikeSteps() { const headers = ['Name']; const rows = [['Johnson'], ['Mary'], ['John']]; return [ (stage) => { stage.innerHTML = `<div class="anim-step-box"><div class="anim-sql-code anim-text-reveal">SELECT * FROM Users <span class="anim-highlight-word">WHERE Name LIKE '%John%'</span></div><div class="anim-desc anim-text-reveal" style="animation-delay: 0.3s;">解析：尋找 Name 中包含 "John" 字串的記錄 (%) 代表任意字符。</div></div>`; }, (stage) => { stage.innerHTML = `<div class="anim-step-box"><div class="anim-sql-code">SELECT * FROM Users <span class="anim-highlight-word">WHERE Name LIKE '%John%'</span></div></div><div class="anim-compare-container anim-table-container" style="animation-delay: 0.2s;"><div class="anim-compare-col"><div class="anim-compare-title">處理過程</div>${buildTable(headers, rows, 'lk_t')}</div></div>`; }, (stage) => { stage.innerHTML = `<div class="anim-step-box"><div class="anim-sql-code">SELECT * FROM Users <span class="anim-highlight-word">WHERE Name LIKE '%John%'</span></div></div><div class="anim-compare-container anim-table-container" style="animation-delay: 0.2s;"><div class="anim-compare-col"><div class="anim-compare-title">處理過程 (標記符合項)</div>${buildTable(headers, rows, 'lk_t2')}</div></div>`; setTimeout(() => { const r0 = document.getElementById('lk_t2_r0'); const r1 = document.getElementById('lk_t2_r1'); const r2 = document.getElementById('lk_t2_r2'); if(r0) r0.classList.add('row-highlight'); if(r1) r1.classList.add('row-fade-out'); if(r2) r2.classList.add('row-highlight'); }, 500); }, (stage) => { let beforeHTML = `<div class="anim-compare-col anim-table-container" style="animation-delay: 0.2s;"><div class="anim-compare-title">處理前 (原表)</div>${buildTable(headers, rows, 'lk_b')}</div>`; let afterHTML = `<div class="anim-compare-col anim-table-container" style="animation-delay: 0.5s;"><div class="anim-compare-title">處理後 (結果)</div><table class="anim-table"><thead><tr><th>Name</th></tr></thead><tbody><tr class="anim-row row-highlight" style="animation-delay: 0.6s;"><td>Johnson</td></tr><tr class="anim-row row-highlight" style="animation-delay: 0.7s;"><td>John</td></tr></tbody></table></div>`; stage.innerHTML = `<div class="anim-step-box"><div class="anim-sql-code">SELECT * FROM Users <span class="anim-highlight-word">WHERE Name LIKE '%John%'</span></div><div class="anim-desc">只保留了包含 "John" 的記錄。</div></div><div class="anim-compare-container">${beforeHTML}${afterHTML}</div>`; } ]; }

    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const themeIcon = document.getElementById('themeIcon');
    function applyTheme(theme) {
        if (theme === 'dark') { document.body.classList.add('dark-mode'); themeIcon.className = 'fas fa-sun'; themeToggleBtn.style.background = 'linear-gradient(135deg, #FBBF24, #F59E0B)'; } 
        else { document.body.classList.remove('dark-mode'); themeIcon.className = 'fas fa-moon'; themeToggleBtn.style.background = 'linear-gradient(135deg, #6B7280, #4B5563)'; }
    }
    themeToggleBtn.addEventListener('click', () => {
        const isDark = document.body.classList.contains('dark-mode');
        const newTheme = isDark ? 'light' : 'dark'; applyTheme(newTheme); localStorage.setItem('sql-quest-theme', newTheme);
    });
    const savedTheme = localStorage.getItem('sql-quest-theme') || 'light'; applyTheme(savedTheme);

    async function initApp() {
        updateStatus('engine', 'off'); updateStatus('cloud', 'off'); updateStatus('db', 'off');
        const engineReady = await sandbox.init();
        updateStatus('engine', engineReady ? 'on' : 'err');
        if(engineReady) { await loadData(); openModal(loginModal); setTimeout(() => updateSlider(document.getElementById('navCats')), 300); } 
        else { showToast('error', 'SQLite 引擎載入失敗，請重新整理'); }
    }
    initApp();
    </script>
